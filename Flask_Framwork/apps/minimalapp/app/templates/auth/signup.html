<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-top">
        <a href="{{ url_for('main.index') }}" class="logo auth-logo">ObjectDetect AI</a>
        <h2>회원가입</h2>
        <p>간단한 정보 입력 후 서비스를 시작할 수 있습니다.</p>
      </div>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" class="styled-form">
        <div class="form-group">
          <label for="username">아이디</label>
          <input
            id="username"
            type="text"
            name="username"
            placeholder="아이디를 입력하세요"
            value="{{ username|default('', true) }}"
          >
        </div>

        <div class="form-group">
          <label for="email">이메일</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="이메일을 입력하세요"
            value="{{ email|default('', true) }}"
          >
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="비밀번호를 입력하세요"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full">회원가입</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('auth.login') }}">로그인으로 이동</a>
        <a href="{{ url_for('main.index') }}">홈으로</a>
      </div>
    </div>
  </div>
</body>
</html>
