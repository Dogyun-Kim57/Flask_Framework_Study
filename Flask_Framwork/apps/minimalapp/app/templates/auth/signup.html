{% extends 'layouts/auth_base.html' %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-top">
      <a href="{{ url_for('main.index') }}" class="logo auth-logo">ObjectDetect AI</a>
      <h2>로그인</h2>
      <p>계정에 로그인하고 서비스를 이용해보세요.</p>
    </div>

    {% if error %}
      <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="styled-form">
      <div class="form-group">
        <label for="username">아이디</label>
        <input
          id="username"
          type="text"
          name="username"
          placeholder="아이디를 입력하세요"
          value="{{ username|default('', true) }}"
        >
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="비밀번호를 입력하세요"
        >
      </div>

      <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('auth.signup') }}">회원가입</a>
      <a href="{{ url_for('main.index') }}">홈으로</a>
    </div>
  </div>
</div>
{% endblock %}
