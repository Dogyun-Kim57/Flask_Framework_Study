<header class="site-header">
  <div class="container header-inner">
    <a href="{{ url_for('main.index') }}" class="logo">
      ObjectDetect AI
    </a>

    <nav class="nav">
      <a href="{{ url_for('main.index') }}">홈</a>
      <a href="{{ url_for('contact.contact') }}">문의하기</a>
      <a href="{{ url_for('post.post_list') }}">게시판</a>
      <a href="{{ url_for('ai_detect.ai_stream') }}">실시간 탐지</a>
      <a href="{{ url_for('traffic.traffic_cctv_page') }}">실시간 교통 탐지</a>
      <a href="{{ url_for('detection.detection_list') }}">탐지 기록</a>

      {% if session.get('user_id') %}

      {% if session.get('role') == 'admin' %}
      <div class="dropdown">
        <button type="button" class="dropdown-toggle">
          관리자 기능
        </button>

        <div class="dropdown-menu">
          <a href="{{ url_for('admin.inquiry_list') }}">문의내역 확인</a>
          <a href="{{ url_for('admin.user_list') }}">가입 회원 정보 확인</a>
          <a href="{{ url_for('post.admin_post_list') }}">게시글 관리</a>

          <!-- 🔥 새로 추가된 관리자 전용 탐지 현황 대시보드 -->
          <a href="{{ url_for('detection_admin.dashboard') }}">탐지 현황 대시보드</a>
        </div>
      </div>
      {% else %}
      <div class="dropdown">
        <button type="button" class="dropdown-toggle">
          회원 기능
        </button>

        <div class="dropdown-menu">
          <a href="{{ url_for('member.profile') }}">내 계정 정보</a>
          <a href="{{ url_for('member.profile_edit') }}">계정 정보 수정</a>
          <a href="{{ url_for('member.inquiry_list') }}">내 문의 내역</a>
          <a href="{{ url_for('post.post_list', my=1) }}">내 게시글</a>
        </div>
      </div>
      {% endif %}

      <a href="{{ url_for('auth.logout') }}" class="nav-login">로그아웃</a>

      {% else %}
      <a href="{{ url_for('auth.login') }}">로그인</a>
      <a href="{{ url_for('auth.signup') }}">회원가입</a>
      {% endif %}
    </nav>
  </div>
</header>
